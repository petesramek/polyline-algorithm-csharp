- facts:
  - name: Namespace
    value:
      text: PolylineAlgorithm.Abstraction
      url: PolylineAlgorithm.Abstraction.html
  - name: Assembly
    value: PolylineAlgorithm.dll
- markdown: >-
    Defines how to produce a <code class="typeparamref">TPolyline</code> from an encoded character buffer (output/write

    direction), and how to extract that buffer back from a <code class="typeparamref">TPolyline</code> (input/read

    direction).
- code: public interface IPolylineFormatter<TPolyline>
- h4: Type Parameters
- parameters:
  - name: TPolyline
    description: >-
      The polyline surface type — for example <xref href="System.String" data-throw-if-not-resolved="false"></xref> or
          <xref href="System.ReadOnlyMemory%601" data-throw-if-not-resolved="false"></xref> of <xref href="System.Char" data-throw-if-not-resolved="false"></xref>.
- h2: Remarks
- markdown: >-
    <p>

    This interface is the polyline-surface counterpart to <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref>.

    The engine exclusively works with <xref href="System.ReadOnlyMemory%601" data-throw-if-not-resolved="false"></xref> of <xref href="System.Char" data-throw-if-not-resolved="false"></xref> internally.

    The formatter is the only code that touches <code class="typeparamref">TPolyline</code>.

    </p>

    <p>

    Use <xref href="PolylineAlgorithm.PolylineFormatter.ForString" data-throw-if-not-resolved="false"></xref>, <xref href="PolylineAlgorithm.PolylineFormatter.ForMemory" data-throw-if-not-resolved="false"></xref>, or

    <xref href="PolylineAlgorithm.PolylineFormatter.Create%60%601(System.Func%7bSystem.ReadOnlyMemory%7bSystem.Char%7d%2c%60%600%7d%2cSystem.Func%7b%60%600%2cSystem.ReadOnlyMemory%7bSystem.Char%7d%7d)" data-throw-if-not-resolved="false"></xref> to obtain a ready-made implementation.

    </p>
