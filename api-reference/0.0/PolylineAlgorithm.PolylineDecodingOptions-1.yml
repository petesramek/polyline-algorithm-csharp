- h2: Remarks
- markdown: >-
    Pass an instance of this class to the chunked

    <xref href="PolylineAlgorithm.Abstraction.IPolylineDecoder%602.Decode(%600%2cPolylineAlgorithm.PolylineDecodingOptions%7b%601%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> overload to control

    the accumulated-delta seed used at the start of each chunk. When <xref href="PolylineAlgorithm.PolylineDecodingOptions%601.HasPrevious" data-throw-if-not-resolved="false"></xref> is

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> zero-initialisation is used, which is the existing default behaviour.
