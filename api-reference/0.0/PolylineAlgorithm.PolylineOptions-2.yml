- h2: Remarks
- markdown: >-
    Combines an <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref> (which defines the column schema, scaling

    rules, and item factory) with an <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%601" data-throw-if-not-resolved="false"></xref> (which converts between

    the raw character buffer and the surface type) and a <xref href="PolylineAlgorithm.PolylineEncodingOptions" data-throw-if-not-resolved="false"></xref> (which

    controls buffer sizes, precision for legacy paths, and logging).
