- h2: Remarks
- markdown: >-
    Each instance wraps a caller-provided <xref href="System.Char" data-throw-if-not-resolved="false"></xref> buffer sized to the worst-case maximum

    capacity so that the buffer never needs to grow. The buffer may be stack-allocated or rented from

    <xref href="System.Buffers.ArrayPool%601" data-throw-if-not-resolved="false"></xref>; the engine calls BeginItem before

    invoking the formatter for each item so that the slot index resets correctly while delta state is

    preserved across item boundaries.
