- h2: Remarks
- markdown: >-
    Instances are constructed exclusively through <xref href="PolylineAlgorithm.FormatterBuilder%602" data-throw-if-not-resolved="false"></xref>.

    The <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/sealed">sealed</a> modifier allows the JIT to devirtualise and inline calls to the

    interface methods in the encoding/decoding hot loop.
