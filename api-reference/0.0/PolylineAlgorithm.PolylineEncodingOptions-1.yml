- api3: HasPrevious
  id: PolylineAlgorithm_PolylineEncodingOptions_1_HasPrevious
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/PolylineEncodingOptions.cs#L46
