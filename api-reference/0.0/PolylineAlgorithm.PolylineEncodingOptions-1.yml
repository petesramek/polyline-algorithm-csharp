    uid: PolylineAlgorithm.PolylineEncodingOptions`1.HasPrevious
    commentId: P:PolylineAlgorithm.PolylineEncodingOptions`1.HasPrevious
- markdown: >-
    Gets a value indicating whether a previous value has been supplied to seed the delta

    baseline. When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> the formatter's built-in baseline is used as the

    starting point (which defaults to zero when no baseline has been configured), equivalent to

    the existing default behaviour.
