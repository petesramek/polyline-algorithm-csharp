      instance with <xref href="PolylineAlgorithm.PolylineDecodingOptions%601.Previous" data-throw-if-not-resolved="false"></xref> set to

      <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> to start from zero (same as calling

