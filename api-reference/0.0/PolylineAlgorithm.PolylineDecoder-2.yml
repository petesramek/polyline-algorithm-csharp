- markdown: >-
    Decodes an encoded <code class="typeparamref">TPolyline</code> into a sequence of

    <code class="typeparamref">TValue</code> instances, applying per-call <code class="paramref">options</code> to

    seed the accumulated-delta state. Use this overload to decode polylines that were produced by

    chunked encoding.
- code: public IEnumerable<TValue> Decode(TPolyline polyline, PolylineDecodingOptions<TValue>? options = null, CancellationToken cancellationToken = default)
