- api1: Namespace PolylineAlgorithm
  id: PolylineAlgorithm
  metadata:
    uid: PolylineAlgorithm
    commentId: N:PolylineAlgorithm
- h3: Namespaces
- parameters:
  - type:
      text: PolylineAlgorithm.Abstraction
      url: PolylineAlgorithm.Abstraction.html
  - type:
      text: PolylineAlgorithm.Extensions
      url: PolylineAlgorithm.Extensions.html
- h3: Classes
- parameters:
  - type:
      text: FormatterBuilder<T>
      url: PolylineAlgorithm.FormatterBuilder-1.html
    description: Provides a fluent builder for constructing a <xref href="PolylineAlgorithm.PolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref>.
  - type:
      text: InvalidPolylineException
      url: PolylineAlgorithm.InvalidPolylineException.html
    description: Exception thrown when a polyline is determined to be malformed or invalid during processing.
  - type:
      text: PolylineEncoding
      url: PolylineAlgorithm.PolylineEncoding.html
    description: >-
      Provides methods for encoding and decoding polyline data, as well as utilities for normalizing and de-normalizing

      geographic coordinate values.
  - type:
      text: PolylineEncodingOptions
      url: PolylineAlgorithm.PolylineEncodingOptions.html
    description: Provides configuration options for polyline encoding operations.
  - type:
      text: PolylineEncodingOptionsBuilder
      url: PolylineAlgorithm.PolylineEncodingOptionsBuilder.html
    description: Provides a builder for configuring options for polyline encoding operations.
  - type:
      text: PolylineFormatter
      url: PolylineAlgorithm.PolylineFormatter.html
    description: >-
      Provides static factory methods and ready-made instances of <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%601" data-throw-if-not-resolved="false"></xref>

      for the most common polyline surface types.
  - type:
      text: PolylineOptions<TValue, TPolyline>
      url: PolylineAlgorithm.PolylineOptions-2.html
    description: Provides unified configuration for a formatter-driven encoding or decoding operation.
  - type:
      text: PolylineValueFormatter<T>
      url: PolylineAlgorithm.PolylineValueFormatter-1.html
    description: >-
      Provides an immutable, sealed rule engine that describes how to extract and scale values from

      an object of type <code class="typeparamref">T</code> for polyline encoding, and how to reconstruct an

      object of type <code class="typeparamref">T</code> from scaled values during decoding.
- h3: Delegates
- parameters:
  - type:
      text: PolylineItemFactory<T>
      url: PolylineAlgorithm.PolylineItemFactory-1.html
    description: >-
      Represents a factory method that reconstructs a <code class="typeparamref">T</code> item from an array of

      scaled integer values decoded from a polyline.
languageId: csharp
