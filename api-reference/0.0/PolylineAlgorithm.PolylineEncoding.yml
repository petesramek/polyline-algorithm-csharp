- h2: Remarks
- markdown: >-
    The <xref href="PolylineAlgorithm.PolylineEncoding" data-throw-if-not-resolved="false"></xref> class includes functionality for working with encoded polyline
        data, such as reading and writing encoded values, as well as methods for normalizing and de-normalizing
        values. It also provides validation utilities to ensure values conform to expected ranges for latitude and
        longitude.
- h2: Methods
- api3: Denormalize(long, uint)
  id: PolylineAlgorithm_PolylineEncoding_Denormalize_System_Int64_System_UInt32_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/PolylineEncoding.cs#L119
