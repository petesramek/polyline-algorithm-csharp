- markdown: Attempts to read a value from the specified buffer and updates the variance.
- code: public static bool TryReadValue(ref int variance, ref ReadOnlyMemory<char> buffer, ref int position)
- h4: Parameters
- parameters:
  - name: variance
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: A reference to the integer that will be updated based on the value read from the buffer.
  - name: buffer
    type:
    - text: ReadOnlyMemory
      url: https://learn.microsoft.com/dotnet/api/system.readonlymemory-1
    - <
    - text: char
      url: https://learn.microsoft.com/dotnet/api/system.char
    - '>'
    description: A reference to the read-only memory buffer containing the data to be processed.
  - name: position
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: A reference to the current position within the buffer. The position is incremented as the method reads data.
- h4: Returns
- parameters:
  - type:
    - text: bool
      url: https://learn.microsoft.com/dotnet/api/system.boolean
    description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a value was successfully read and the end of the buffer was not reached; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
- h4: Remarks
- markdown: >-
    This method processes the buffer starting at the specified position and attempts to decode a value.
        The decoded value is used to update the <code class="paramref">variance</code> parameter. The method stops reading when a
        termination condition is met or the end of the buffer is reached.
- api3: TryWriteValue(int, ref Span<char>, ref int)
  id: PolylineAlgorithm_PolylineEncoding_TryWriteValue_System_Int32_System_Span_System_Char___System_Int32__
  src: https://github.com/sramekpete/polyline-algorithm-csharp/blob/develop/1.1/src/PolylineAlgorithm/PolylineEncoding.cs#L133
  metadata:
    uid: PolylineAlgorithm.PolylineEncoding.TryWriteValue(System.Int32,System.Span{System.Char}@,System.Int32@)
    commentId: M:PolylineAlgorithm.PolylineEncoding.TryWriteValue(System.Int32,System.Span{System.Char}@,System.Int32@)
- markdown: Attempts to write a value derived from the specified <code class="paramref">variance</code> into the provided <code class="paramref">buffer</code> at the given <code class="paramref">position</code>.
- code: public static bool TryWriteValue(int variance, ref Span<char> buffer, ref int position)
- h4: Parameters
- parameters:
  - name: variance
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: The integer value used to calculate the output to be written into the buffer.
  - name: buffer
    type:
    - text: Span
      url: https://learn.microsoft.com/dotnet/api/system.span-1
    - <
    - text: char
      url: https://learn.microsoft.com/dotnet/api/system.char
    - '>'
    description: A reference to the span of characters where the value will be written.
  - name: position
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: >-
      A reference to the current position in the buffer where writing begins. This value is updated to reflect the new

      position after writing.
- h4: Returns
- parameters:
  - type:
    - text: bool
      url: https://learn.microsoft.com/dotnet/api/system.boolean
    description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the value was successfully written to the buffer; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
- h4: Remarks
- markdown: >-
    This method performs bounds checking to ensure that the buffer has sufficient space to

    accommodate the calculated value. If the buffer does not have enough space, the method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> without modifying the buffer or position.
