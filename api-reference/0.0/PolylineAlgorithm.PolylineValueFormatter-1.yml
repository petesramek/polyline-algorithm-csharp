- api3: GetBaseline(int)
  id: PolylineAlgorithm_PolylineValueFormatter_1_GetBaseline_System_Int32_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/PolylineValueFormatter.cs#L128
  metadata:
    uid: PolylineAlgorithm.PolylineValueFormatter`1.GetBaseline(System.Int32)
    commentId: M:PolylineAlgorithm.PolylineValueFormatter`1.GetBaseline(System.Int32)
- markdown: >-
    Returns the baseline for the column at <code class="paramref">index</code>, or <code>0</code> if none is configured.

    The encoder subtracts this value from the first item's scaled column value during encoding.
- code: public long GetBaseline(int index)
- h4: Parameters
- parameters:
  - name: index
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: >-
      The zero-based column index. Must be in the range <code>[0, <xref href="PolylineAlgorithm.PolylineValueFormatter%601.Width" data-throw-if-not-resolved="false"></xref>)</code>.

      An <xref href="System.IndexOutOfRangeException" data-throw-if-not-resolved="false"></xref> is thrown if the index is out of range.
- h4: Returns
- parameters:
  - type:
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    description: The baseline value, or <code>0</code> when no baseline has been defined for the column.
- api3: GetValues(T, Span<long>)
  id: PolylineAlgorithm_PolylineValueFormatter_1_GetValues__0_System_Span_System_Int64__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/PolylineValueFormatter.cs#L83
  metadata:
    uid: PolylineAlgorithm.PolylineValueFormatter`1.GetValues(`0,System.Span{System.Int64})
    commentId: M:PolylineAlgorithm.PolylineValueFormatter`1.GetValues(`0,System.Span{System.Int64})
- markdown: >-
    Extracts and scales all column values from <code class="paramref">item</code> into the <code class="paramref">values</code> span.

    Called once per item in the encoding hot loop. This method performs no heap allocation;

    the caller is responsible for providing and owning the output buffer.
- code: public void GetValues(T item, Span<long> values)
- h4: Parameters
- parameters:
  - name: item
    type:
    - T
    description: The source item from which column values are extracted.
  - name: values
    type:
    - text: Span
      url: https://learn.microsoft.com/dotnet/api/system.span-1
    - <
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    - '>'
    description: >-
      Output buffer that receives the scaled values.

      Its length must equal <xref href="PolylineAlgorithm.PolylineValueFormatter%601.Width" data-throw-if-not-resolved="false"></xref>.
- h4: Exceptions
- parameters:
  - type:
    - text: ArgumentException
      url: https://learn.microsoft.com/dotnet/api/system.argumentexception
    description: Thrown when <code class="paramref">values</code>.Length does not equal <xref href="PolylineAlgorithm.PolylineValueFormatter%601.Width" data-throw-if-not-resolved="false"></xref>.
languageId: csharp
