  id: PolylineAlgorithm_PolylineValueFormatter_1_HasBaselines
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/PolylineValueFormatter.cs#L61
