- h2: Remarks
- markdown: >-
    <p>

    Instances of this class are constructed exclusively through <xref href="PolylineAlgorithm.FormatterBuilder%601" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    The <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/sealed">sealed</a> modifier allows the JIT to devirtualise and inline calls to

    <xref href="PolylineAlgorithm.PolylineValueFormatter%601.GetValues(%600%2cSystem.Span%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref> and <xref href="PolylineAlgorithm.PolylineValueFormatter%601.CreateItem(System.ReadOnlySpan%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>, eliminating vtable dispatch in the

    encoding/decoding hot loop.

    </p>
