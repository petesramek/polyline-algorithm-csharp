- markdown: >-
    Gets a value indicating whether any column has a baseline defined.

    When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> the encoder can skip the baseline-subtraction branch entirely,

    keeping the common-case encoding path branch-free.
