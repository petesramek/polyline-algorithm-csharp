### YamlMime:ApiPage
title: Interface IPolylineFormatter<TValue, TPolyline>
body:
- api1: Interface IPolylineFormatter<TValue, TPolyline>
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L23
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2
    commentId: T:PolylineAlgorithm.Abstraction.IPolylineFormatter`2
- facts:
  - name: Namespace
    value:
      text: PolylineAlgorithm.Abstraction
      url: PolylineAlgorithm.Abstraction.html
  - name: Assembly
    value: PolylineAlgorithm.dll
- markdown: >-
    Defines how to extract and scale values from a <code class="typeparamref">TValue</code> for encoding,

    reconstruct a <code class="typeparamref">TValue</code> from scaled values for decoding,

    produce a <code class="typeparamref">TPolyline</code> from an encoded character buffer, and extract that buffer

    back from a <code class="typeparamref">TPolyline</code>.
- code: public interface IPolylineFormatter<TValue, TPolyline>
- h4: Type Parameters
- parameters:
  - name: TValue
    description: The coordinate or item type. For example a struct with Latitude/Longitude.
  - name: TPolyline
    description: >-
      The polyline surface type. For example <xref href="System.String" data-throw-if-not-resolved="false"></xref> or
          <xref href="System.ReadOnlyMemory%601" data-throw-if-not-resolved="false"></xref> of <xref href="System.Char" data-throw-if-not-resolved="false"></xref>.
- h2: Remarks
- markdown: >-
    Use <xref href="PolylineAlgorithm.FormatterBuilder%602" data-throw-if-not-resolved="false"></xref> to build a

    <xref href="PolylineAlgorithm.PolylineFormatter%602" data-throw-if-not-resolved="false"></xref> that implements this interface.
- h2: Properties
- api3: Width
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_Width
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L29
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Width
    commentId: P:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Width
- markdown: >-
    Gets the number of values (columns) per encoded item.

    This is the required length of the <xref href="System.Span%601" data-throw-if-not-resolved="false"></xref> passed to <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%602.GetValues(%600%2cSystem.Span%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>

    and the length of the span received in <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%602.CreateItem(System.ReadOnlySpan%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>.
- code: int Width { get; }
- h4: Property Value
- parameters:
  - type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
- h2: Methods
- api3: CreateItem(ReadOnlySpan<long>)
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_CreateItem_System_ReadOnlySpan_System_Int64__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L76
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.CreateItem(System.ReadOnlySpan{System.Int64})
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.CreateItem(System.ReadOnlySpan{System.Int64})
- markdown: >-
    Reconstructs a <code class="typeparamref">TValue</code> from the given accumulated scaled integer values.

    Called once per decoded item in the decoding loop. Implementations are responsible for

    denormalizing the raw scaled integers (e.g. dividing by the precision factor and adding back

    any baseline) before constructing the item.
- code: TValue CreateItem(ReadOnlySpan<long> values)
- h4: Parameters
- parameters:
  - name: values
    type:
    - text: ReadOnlySpan
      url: https://learn.microsoft.com/dotnet/api/system.readonlyspan-1
    - <
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    - '>'
    description: >-
      The raw accumulated scaled integer values decoded from the polyline. Each element corresponds to

      the same column position as in <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%602.GetValues(%600%2cSystem.Span%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>. These are the direct output of the

      delta-accumulation loop in the decoder before any denormalization is applied.
- h4: Returns
- parameters:
  - type:
    - TValue
    description: A <code class="typeparamref">TValue</code> reconstructed from <code class="paramref">values</code>.
- api3: GetBaseline(int)
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_GetBaseline_System_Int32_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L38
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.GetBaseline(System.Int32)
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.GetBaseline(System.Int32)
- markdown: >-
    Returns the baseline for the column at <code class="paramref">index</code>, or <code>0</code> if none is configured.

    The encoder uses this as the starting point for the first item's delta computation: the initial

    delta for the column is <code>scaled_first_value − baseline</code> rather than <code>scaled_first_value</code>.
- code: long GetBaseline(int index)
- h4: Parameters
- parameters:
  - name: index
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: The zero-based column index. Must be in the range <code>[0, <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%602.Width" data-throw-if-not-resolved="false"></xref>)</code>.
- h4: Returns
- parameters:
  - type:
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    description: The baseline value, or <code>0</code> when no baseline has been defined for the column.
- api3: GetValues(TValue, Span<long>)
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_GetValues__0_System_Span_System_Int64__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L48
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.GetValues(`0,System.Span{System.Int64})
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.GetValues(`0,System.Span{System.Int64})
- markdown: >-
    Extracts and scales all column values from <code class="paramref">item</code> into the <code class="paramref">values</code> span.

    Called once per item in the encoding loop.
- code: void GetValues(TValue item, Span<long> values)
- h4: Parameters
- parameters:
  - name: item
    type:
    - TValue
    description: The source item from which column values are extracted.
  - name: values
    type:
    - text: Span
      url: https://learn.microsoft.com/dotnet/api/system.span-1
    - <
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    - '>'
    description: Output buffer that receives the scaled integer values. Its length must equal <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%602.Width" data-throw-if-not-resolved="false"></xref>.
- api3: Read(TPolyline)
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_Read__1_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L62
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Read(`1)
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Read(`1)
- markdown: Extracts the character buffer from a <code class="typeparamref">TPolyline</code> for the decoder to read.
- code: ReadOnlyMemory<char> Read(TPolyline polyline)
- h4: Parameters
- parameters:
  - name: polyline
    type:
    - TPolyline
    description: The polyline to read from.
- h4: Returns
- parameters:
  - type:
    - text: ReadOnlyMemory
      url: https://learn.microsoft.com/dotnet/api/system.readonlymemory-1
    - <
    - text: char
      url: https://learn.microsoft.com/dotnet/api/system.char
    - '>'
    description: A <xref href="System.ReadOnlyMemory%601" data-throw-if-not-resolved="false"></xref> of <xref href="System.Char" data-throw-if-not-resolved="false"></xref> representing the encoded characters.
- api3: Write(ReadOnlyMemory<char>)
  id: PolylineAlgorithm_Abstraction_IPolylineFormatter_2_Write_System_ReadOnlyMemory_System_Char__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineFormatter.cs#L55
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Write(System.ReadOnlyMemory{System.Char})
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineFormatter`2.Write(System.ReadOnlyMemory{System.Char})
- markdown: Creates a <code class="typeparamref">TPolyline</code> from the encoded character buffer produced by the encoder.
- code: TPolyline Write(ReadOnlyMemory<char> encoded)
- h4: Parameters
- parameters:
  - name: encoded
    type:
    - text: ReadOnlyMemory
      url: https://learn.microsoft.com/dotnet/api/system.readonlymemory-1
    - <
    - text: char
      url: https://learn.microsoft.com/dotnet/api/system.char
    - '>'
    description: The encoded polyline as a read-only memory of characters.
- h4: Returns
- parameters:
  - type:
    - TPolyline
    description: A <code class="typeparamref">TPolyline</code> wrapping or derived from <code class="paramref">encoded</code>.
languageId: csharp
