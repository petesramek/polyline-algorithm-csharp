- h2: Remarks
- markdown: >-
    <p>

    <b>Formatter-based use (no subclassing required):</b>

    Supply a <xref href="PolylineAlgorithm.PolylineOptions%602" data-throw-if-not-resolved="false"></xref> via the

    <xref href="PolylineAlgorithm.Abstraction.AbstractPolylineEncoder%602.%23ctor(PolylineAlgorithm.PolylineOptions%7b%600%2c%601%7d)" data-throw-if-not-resolved="false"></xref>

    constructor. The formatter handles all type-specific concerns; override nothing.

    </p>

    <p>

    <b>Legacy override-based use:</b>

    Derive from this class and override <xref href="PolylineAlgorithm.Abstraction.AbstractPolylineEncoder%602.GetLatitude(%600)" data-throw-if-not-resolved="false"></xref>, <xref href="PolylineAlgorithm.Abstraction.AbstractPolylineEncoder%602.GetLongitude(%600)" data-throw-if-not-resolved="false"></xref>,

    and <xref href="PolylineAlgorithm.Abstraction.AbstractPolylineEncoder%602.CreatePolyline(System.ReadOnlyMemory%7bSystem.Char%7d)" data-throw-if-not-resolved="false"></xref> to provide type-specific behaviour. These overrides take

    priority over any registered formatter.

    </p>
