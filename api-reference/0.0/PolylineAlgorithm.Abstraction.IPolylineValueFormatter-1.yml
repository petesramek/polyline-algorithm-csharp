title: Interface IPolylineValueFormatter<TValue>
body:
- api1: Interface IPolylineValueFormatter<TValue>
  id: PolylineAlgorithm_Abstraction_IPolylineValueFormatter_1
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineValueFormatter.cs#L26
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1
    commentId: T:PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1
- facts:
  - name: Namespace
    value:
      text: PolylineAlgorithm.Abstraction
      url: PolylineAlgorithm.Abstraction.html
  - name: Assembly
    value: PolylineAlgorithm.dll
- markdown: >-
    Defines how to extract scaled numeric values from a <code class="typeparamref">TValue</code> during encoding, and

    how to reconstruct a <code class="typeparamref">TValue</code> from those values during decoding.
- code: public interface IPolylineValueFormatter<TValue>
- h4: Type Parameters
- parameters:
  - name: TValue
    description: The coordinate or item type that the formatter understands.
- h2: Remarks
- markdown: >-
    <p>

    This interface is the coordinate-side counterpart to <xref href="PolylineAlgorithm.Abstraction.IPolylineFormatter%601" data-throw-if-not-resolved="false"></xref>.

    Together they allow the engine base classes to be used directly — without subclassing — by supplying

    both formatters via <xref href="PolylineAlgorithm.PolylineOptions%602" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Use <xref href="PolylineAlgorithm.FormatterBuilder%601" data-throw-if-not-resolved="false"></xref> to build a <xref href="PolylineAlgorithm.PolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref> that

    already implements this interface.

    </p>
- h2: Properties
- api3: Width
  id: PolylineAlgorithm_Abstraction_IPolylineValueFormatter_1_Width
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineValueFormatter.cs#L54
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.Width
    commentId: P:PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.Width
- markdown: >-
    Gets the number of values (columns) per encoded item.

    This is the required length of the buffer passed to <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601.GetValues(%600%2cSystem.Span%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref> and

    the length of the span received in <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601.CreateItem(System.ReadOnlySpan%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>.
- code: int Width { get; }
- h4: Property Value
- parameters:
  - type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
- h2: Methods
- api3: CreateItem(ReadOnlySpan<long>)
  id: PolylineAlgorithm_Abstraction_IPolylineValueFormatter_1_CreateItem_System_ReadOnlySpan_System_Int64__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineValueFormatter.cs#L47
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.CreateItem(System.ReadOnlySpan{System.Int64})
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.CreateItem(System.ReadOnlySpan{System.Int64})
- markdown: >-
    Reconstructs a <code class="typeparamref">TValue</code> from the given scaled integer values.

    Called once per decoded item in the decoding loop.
- code: TValue CreateItem(ReadOnlySpan<long> values)
- h4: Parameters
- parameters:
  - name: values
    type:
    - text: ReadOnlySpan
      url: https://learn.microsoft.com/dotnet/api/system.readonlyspan-1
    - <
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    - '>'
    description: >-
      The accumulated scaled integer values decoded from the polyline. Each element corresponds to

      the same column position as in <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601.GetValues(%600%2cSystem.Span%7bSystem.Int64%7d)" data-throw-if-not-resolved="false"></xref>.
- h4: Returns
- parameters:
  - type:
    - TValue
    description: A <code class="typeparamref">TValue</code> reconstructed from <code class="paramref">values</code>.
- api3: GetBaseline(int)
  id: PolylineAlgorithm_Abstraction_IPolylineValueFormatter_1_GetBaseline_System_Int32_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineValueFormatter.cs#L62
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.GetBaseline(System.Int32)
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.GetBaseline(System.Int32)
- markdown: >-
    Returns the baseline (epoch) for the column at <code class="paramref">index</code>, or <code>0</code> if none is configured.

    The encoder subtracts this value from the first item's scaled column value to keep the initial delta small.
- code: long GetBaseline(int index)
- h4: Parameters
- parameters:
  - name: index
    type:
    - text: int
      url: https://learn.microsoft.com/dotnet/api/system.int32
    description: The zero-based column index. Must be in the range <code>[0, <xref href="PolylineAlgorithm.Abstraction.IPolylineValueFormatter%601.Width" data-throw-if-not-resolved="false"></xref>)</code>.
- h4: Returns
- parameters:
  - type:
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    description: The baseline value, or <code>0</code> when no baseline has been defined for the column.
- api3: GetValues(TValue, Span<long>)
  id: PolylineAlgorithm_Abstraction_IPolylineValueFormatter_1_GetValues__0_System_Span_System_Int64__
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/copilot/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/Abstraction/IPolylineValueFormatter.cs#L36
  metadata:
    uid: PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.GetValues(`0,System.Span{System.Int64})
    commentId: M:PolylineAlgorithm.Abstraction.IPolylineValueFormatter`1.GetValues(`0,System.Span{System.Int64})
- markdown: >-
    Extracts and scales all column values from <code class="paramref">item</code> into the <code class="paramref">values</code> span.

    Called once per item in the encoding loop.
- code: void GetValues(TValue item, Span<long> values)
- h4: Parameters
- parameters:
  - name: item
    type:
    - TValue
    description: The source item from which column values are extracted.
  - name: values
    type:
    - text: Span
      url: https://learn.microsoft.com/dotnet/api/system.span-1
    - <
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    - '>'
    description: >-
      Output buffer that receives the scaled integer values. Its length must equal the number of columns

      defined by this formatter.
languageId: csharp
metadata:
  description: >-
