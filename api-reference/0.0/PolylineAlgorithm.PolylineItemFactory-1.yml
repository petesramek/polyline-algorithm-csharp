- markdown: >-
    Represents a factory method that reconstructs a <code class="typeparamref">T</code> item from denormalized

    values decoded from a polyline.
- code: public delegate T PolylineItemFactory<T>(ReadOnlySpan<double> values)
- h4: Parameters
- parameters:
  - name: values
    type:
    - text: ReadOnlySpan
      url: https://learn.microsoft.com/dotnet/api/system.readonlyspan-1
    - <
    - text: double
      url: https://learn.microsoft.com/dotnet/api/system.double
    - '>'
    description: >-
      The denormalized values reconstructed by the polyline decoder. Each element corresponds to the

      original <xref href="System.Double" data-throw-if-not-resolved="false"></xref> value that was encoded, with the precision factor divided out and any

      baseline added back. The span length equals the number of columns defined via

      <xref href="PolylineAlgorithm.FormatterBuilder%602.AddValue(System.String%2cSystem.Func%7b%600%2cSystem.Double%7d%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref>.
- h4: Returns
- parameters:
  - type:
    - T
    description: A <code class="typeparamref">T</code> instance reconstructed from <code class="paramref">values</code>.
- h4: Type Parameters
- parameters:
  - name: T
    description: The value or item type to create.
