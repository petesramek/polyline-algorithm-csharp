  - text: object.ToString()
    url: https://learn.microsoft.com/dotnet/api/system.object.tostring
- h2: Remarks
- markdown: >-
    <p>

    Use <xref href="PolylineAlgorithm.FormatterBuilder%601.Create" data-throw-if-not-resolved="false"></xref> to obtain an instance, call <xref href="PolylineAlgorithm.FormatterBuilder%601.AddValue(System.String%2cSystem.Func%7b%600%2cSystem.Double%7d%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref> once per column,

    optionally chain <xref href="PolylineAlgorithm.FormatterBuilder%601.SetBaseline(System.Int64)" data-throw-if-not-resolved="false"></xref> to specify an epoch for the most-recently added column,

    optionally chain <xref href="PolylineAlgorithm.FormatterBuilder%601.WithCreate(PolylineAlgorithm.PolylineItemFactory%7b%600%7d)" data-throw-if-not-resolved="false"></xref> to register a factory for the decoding direction,

    then call <xref href="PolylineAlgorithm.FormatterBuilder%601.Build" data-throw-if-not-resolved="false"></xref> to produce the immutable <xref href="PolylineAlgorithm.PolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    The builder is the <em>only</em> way to create a <xref href="PolylineAlgorithm.PolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref> — its

    constructor is internal.

    </p>
