- markdown: Provides a fluent builder for constructing a <xref href="PolylineAlgorithm.PolylineValueFormatter%601" data-throw-if-not-resolved="false"></xref>.
- code: public sealed class FormatterBuilder<T>
- h4: Type Parameters
- parameters:
