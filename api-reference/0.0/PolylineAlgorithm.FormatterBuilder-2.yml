- api3: SetBaseline(long)
  id: PolylineAlgorithm_FormatterBuilder_2_SetBaseline_System_Int64_
  src: https://github.com/petesramek/polyline-algorithm-csharp/blob/extend-polylinealgorithm-multi-dimensional-support/src/PolylineAlgorithm/FormatterBuilder.cs#L106
  metadata:
    uid: PolylineAlgorithm.FormatterBuilder`2.SetBaseline(System.Int64)
    commentId: M:PolylineAlgorithm.FormatterBuilder`2.SetBaseline(System.Int64)
- markdown: >-
    Sets a reference value (baseline) on the most-recently added column.

    During encoding, the baseline is subtracted from the first item's scaled column value so that

    the initial delta is <code>scaled_first_value − baseline</code> rather than <code>scaled_first_value</code>.

    Use this when the absolute scaled value of the first data point for a column would otherwise

    produce a very large initial encoded delta.
- code: public FormatterBuilder<TValue, TPolyline> SetBaseline(long baseline)
- h4: Parameters
- parameters:
  - name: baseline
    type:
    - text: long
      url: https://learn.microsoft.com/dotnet/api/system.int64
    description: >-
      The reference value to subtract from the first item's scaled column value during encoding.

      The decoder automatically adds this value back, so the reconstructed item matches the

      original input.
