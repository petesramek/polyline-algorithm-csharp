- markdown: >-
    Registers a factory delegate used to reconstruct a <code class="typeparamref">TValue</code> from

    denormalized values during decoding.
- code: public FormatterBuilder<TValue, TPolyline> WithValueFactory(PolylineItemFactory<TValue> create)
- h4: Parameters
- parameters:
  - name: create
    type:
    - text: PolylineItemFactory
      url: PolylineAlgorithm.PolylineItemFactory-1.html
    - <
    - TValue
    - '>'
    description: >-
      A delegate that accepts the denormalized <xref href="System.Double" data-throw-if-not-resolved="false"></xref> values reconstructed from the

      polyline and returns a <code class="typeparamref">TValue</code>. The formatter automatically divides

      each accumulated scaled integer by its precision factor and adds back any baseline configured

      via <xref href="PolylineAlgorithm.FormatterBuilder%602.SetBaseline(System.Int64)" data-throw-if-not-resolved="false"></xref>, so the span values match the original values supplied to the

      encoder. The span length always equals the number of columns added via <xref href="PolylineAlgorithm.FormatterBuilder%602.AddValue(System.String%2cSystem.Func%7b%600%2cSystem.Double%7d%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref>.
