- h2: Remarks
- markdown: >-
    <p>

    Use <xref href="PolylineAlgorithm.FormatterBuilder%602.Create" data-throw-if-not-resolved="false"></xref> to obtain an instance, call <xref href="PolylineAlgorithm.FormatterBuilder%602.AddValue(System.String%2cSystem.Func%7b%600%2cSystem.Double%7d%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref> once per column,

    optionally chain <xref href="PolylineAlgorithm.FormatterBuilder%602.SetBaseline(System.Int64)" data-throw-if-not-resolved="false"></xref> to set a reference baseline for the most-recently added column,

    optionally chain <xref href="PolylineAlgorithm.FormatterBuilder%602.WithValueFactory(PolylineAlgorithm.PolylineItemFactory%7b%600%7d)" data-throw-if-not-resolved="false"></xref> to register a factory for the decoding direction,

    call <xref href="PolylineAlgorithm.FormatterBuilder%602.WithReaderWriter(System.Func%7bSystem.ReadOnlyMemory%7bSystem.Char%7d%2c%601%7d%2cSystem.Func%7b%601%2cSystem.ReadOnlyMemory%7bSystem.Char%7d%7d)" data-throw-if-not-resolved="false"></xref> to supply the polyline surface delegates (required), then call

    <xref href="PolylineAlgorithm.FormatterBuilder%602.Build" data-throw-if-not-resolved="false"></xref> to produce the immutable <xref href="PolylineAlgorithm.PolylineFormatter%602" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    The builder is the <em>only</em> way to create a <xref href="PolylineAlgorithm.PolylineFormatter%602" data-throw-if-not-resolved="false"></xref>

    — its constructor is internal.

    </p>
