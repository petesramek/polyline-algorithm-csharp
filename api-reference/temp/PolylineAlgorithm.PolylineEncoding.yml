  assemblies:
  - PolylineAlgorithm
  namespace: PolylineAlgorithm
  summary: Normalizes a given numeric value based on the specified type and precision settings.
  remarks: >-
    This method validates the input value to ensure it is finite and within the acceptable range

    for the specified type. If the value is valid, it applies a normalization algorithm using a predefined precision

    factor.
  example: []
  syntax:
    content: public static int Normalize(double value, CoordinateValueType type)
    parameters:
    - id: value
      type: System.Double
      description: The numeric value to normalize. Must be a finite number.
    - id: type
      type: PolylineAlgorithm.CoordinateValueType
      description: The type against which the value is validated. Determines the acceptable range for the value.
    return:
      type: System.Int32
      description: An integer representing the normalized value. Returns <code>0</code> if the input value is <code>0.0</code>.
    content.vb: Public Shared Function Normalize(value As Double, type As CoordinateValueType) As Integer
