# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          **/bin/*
          **/obj/*

  test:
    needs: [build]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.x
    - uses: actions/download-artifact@v4
      with:
        name: build
        path: .
        merge-multiple: true
    - name: Display structure of downloaded files
      run: ls -R .
    - name: Test
      run: dotnet test --no-restore --no-build --verbosity normal

  benchmark:
    needs: [build]

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    concurrency:
      group: benchmark-group
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.x
    - uses: actions/download-artifact@v4
      with:
        name: build
        path: .
        merge-multiple: true
    - name: Decode Benchmark
      working-directory: ./benchmarks/PolylineAlgorithm.Benchmarks
      run: dotnet run -c Release --no-restore --no-build --framework net9.0 --runtimes net9.0 --filter '*DecodeBenchmark*'
    - name: Encode Benchmark
      working-directory: ./benchmarks/PolylineAlgorithm.Benchmarks
      run: dotnet run -c Release --no-restore --no-build --framework net9.0 --runtimes net9.0 --filter '*EncodeBenchmark*'