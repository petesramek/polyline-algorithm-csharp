name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build with .NET 9

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build ./src/**/*.csproj --no-restore --configuration Release
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          src/**/bin/*
          src/**/obj/*

  test:
    name: Test with MsTest
    needs: [build]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
    - name: Test
      run: dotnet test ./tests/**/*Tests.csproj --configuration Release --verbosity normal --logger trx --collect:"Code Coverage" --results-directory TestResults
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/TestResults/*