name: .NET

on:
  push:
    branches: [ $default-branch ]
  pull_request:
    branches: [ $default-branch ]

env:
  dotnet_version: ${{ vars.DOTNET_VERSION }}

jobs:
  build:
    name: Build with .NET ${{ env.$dotnet_version }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install .NET $dotnet_version
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: $dotnet_version
    - name: Build
      run: dotnet build ./src/**/*.csproj --configuration Release /p:Platform=AnyCPU
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          **/bin/*
          **/obj/*

  test:
    name: Test with .NET ${{ env.$dotnet_version }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET $dotnet_version
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: $dotnet_version
    - name: Test
      run: dotnet test ./tests/**/*Tests.csproj --configuration Release /p:Platform=AnyCPU --verbosity normal --settings unit-test.runsettings --logger trx --collect:"Code Coverage" --results-directory test-results
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/test-results/*

  pack:
    name: Pack with .NET ${{ env.$dotnet_version }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install .NET $dotnet_version
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: $dotnet_version
    - name: Download
      uses: actions/download-artifact@v4
      with:
        name: build
    - name: Pack
      run: dotnet pack ./src/**/*.csproj --no-build --no-restore --configuration Release  /p:Platform=AnyCPU
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: |
          **/*.nupkg
