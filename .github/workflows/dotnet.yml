name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build with .NET 9
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
    - name: Build
      run: dotnet build ./src/**/*.csproj --configuration Release
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          ./src/**/bin/*
          ./src/**/obj/*

  test:
    name: Test with MsTest
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
    - name: Test
      run: dotnet test ./tests/**/*Tests.csproj --configuration Release --verbosity normal --settings unit-test.runsettings --logger trx --collect:"Code Coverage" --results-directory test-results
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/test-results/*

  pack:
    name: Pack with .NET 9
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
    - name: Download
      uses: actions/download-artifact@v4
      with:
        name: build
    - name: Display structure of downloaded files
      run: ls -R
    - name: Pack
      run: dotnet pack ./src/**/*.csproj --configuration Release
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: |
          ./src/**/*.nupkg
