name: Format *.cs files 

on:
  push:
    branches:
    - 'develop/**'
    paths:
      - '**.cs'
  pull_request:
    branches:
    - 'main'
    - 'preview/**'
    - 'release/**'
    - 'support/**'
    paths:
      - '**.cs'

permissions:
  actions: read
  contents: write

concurrency: 
  group: ${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:      
  formatting:
    name: Format whitespace, code style and file header
    runs-on: ubuntu-latest
    steps:
    - name: Checkout ${{ github.head_ref || github.ref }}
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ vars.DOTNET_SDK_VERSION }}
    - name: Install dotnet-format tool
      run: dotnet tool install -g dotnet-format
    - name: Format with .NET CLI
      run: |
        git checkout ${{ github.head_ref || github.ref }}
        dotnet format whitespace --verbosity diagnostic
        dotnet format style --verbosity diagnostic
        dotnet format analyzers --diagnostics IDE0005 IDE0073 --verbosity diagnostic
      working-directory: ${{ github.workspace }}
    - if: runner.os == 'Windows'
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - if: runner.os != 'Windows'
      run: |
        git config --global core.autocrlf true
        git config --global core.eol lf
    - name: Push changes to ${{ github.head_ref || github.ref }}
      run: |
        git add .
        git config user.name "$(git log -n 1 --pretty=format:%an)"
        git config user.email "$(git log -n 1 --pretty=format:%ae)"
        git commit -m "applied file header rule"
        git pull origin ${{ github.head_ref || github.ref }}
        git push origin ${{ github.head_ref || github.ref }}
      working-directory: ${{ github.workspace }}
