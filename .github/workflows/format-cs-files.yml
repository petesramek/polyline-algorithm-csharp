name: Format *.cs files 

on:
  push:
    branches:
    - 'develop/**'
  pull_request:
    branches:
    - 'main'
    - 'preview/**'
    - 'release/**'
    - 'support/**'
    paths:
      - '**.cs'

permissions:
  actions: read
  contents: write

concurrency: 
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:      
  formatting:
    name: Format file headers with .NET ${{ vars.DOTNET_SDK_VERSION }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Install .NET ${{ vars.DOTNET_SDK_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ vars.DOTNET_SDK_VERSION }}
    - run: |
        dotnet format style --verify-no-changes --verbosity diagnostic
        dotnet format analyzers --verify-no-changes --diagnostics IDE0073 --verbosity diagnostic
        echo "has-changes=true" >> "$GITHUB_OUTPUT"
      id: validate
      continue-on-error: true
      working-directory: ${{ github.workspace }}
    - run: |
        echo ${{ steps.validate.outputs.has-changes }}
        echo ${{ steps.validate.outcome }}
    - run: |
        dotnet format style --verbosity diagnostic
        dotnet format analyzers --diagnostics IDE0073 --verbosity diagnostic
      name: Apply style formatting and file header rule
      if: ${{ fromJSON(steps.validate.outputs.has-changes) }}
      working-directory: ${{ github.workspace }}
    - run: |
        git add .
        git config user.name "$(git log -n 1 --pretty=format:%an)"
        git config user.email "$(git log -n 1 --pretty=format:%ae)"
        git commit -m "applied file header rule" 
        git pull origin ${{ github.ref }}
        git push origin ${{ github.ref }}
      name: Push style formatting and file header rule to ${{ github.ref }}
      if: ${{ fromJSON(steps.validate.outputs.has-changes) }}
      working-directory: ${{ github.workspace }}
