name: Format *.cs files 

on:
  push:
    branches:
    - 'develop/**'
  pull_request:
    branches:
    - 'main'
    - 'preview/**'
    - 'release/**'
    - 'support/**'
    paths:
      - '**.cs'

permissions:
  actions: read
  contents: write

concurrency: 
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:      
  formatting:
    name: Format file headers with .NET ${{ vars.DOTNET_SDK_VERSION }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Install .NET ${{ vars.DOTNET_SDK_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ vars.DOTNET_SDK_VERSION }}
    - name: Install dotnet-format tool
      run: dotnet tool install -g dotnet-format
    - name: Format with .NET ${{ vars.DOTNET_SDK_VERSION }}
      run: |
        dotnet format whitespace
        dotnet format style
        dotnet format analyzers --diagnostics IDE0073
      working-directory: ${{ github.workspace }}
    - name: Validate with .NET ${{ vars.DOTNET_SDK_VERSION }}
      id: validate
      shell: bash
      run: |
        set +e
        git diff --quiet --exit-code --cached
        echo has-changes="$?" >> $GITHUB_OUTPUT
        set -e
      working-directory: ${{ github.workspace }}
    - name: Push to ${{ github.ref }}
      if: ${{ fromJSON(steps.validate.outputs.has-changes) == 1 }}
      run: |
        echo ${{ steps.validate.outputs.has-changes }}
        echo ${{ fromJSON(steps.validate.outputs.has-changes) }}
        echo ${{ fromJSON(steps.validate.outputs.has-changes) == 1 }}
        git add .
        git config user.name "$(git log -n 1 --pretty=format:%an)"
        git config user.email "$(git log -n 1 --pretty=format:%ae)"
        git commit -m "applied file header rule" 
        git pull origin ${{ github.ref }}
        git push origin ${{ github.ref }}
      working-directory: ${{ github.workspace }}
