name: 'Promote branch'

on:
  workflow_dispatch:
   inputs:
     promotion-type:
       type: choice
       options:
         - 'preview'
         - 'release'
       description: 'Promotion type.'
       required: true

permissions:
  actions: read
  id-token: write
  contents: write

concurrency:
    group: 'promote-branch-${{ inputs.promotion-type }}-${{ github.head_ref || github.ref }}'
    cancel-in-progress: false

env:
  dotnet-sdk-version: '9.x'
  is-development-branch: ${{ startsWith(github.ref_name, 'develop') }}
  is-maintenance-branch: ${{ startsWith(github.ref_name, 'support') }}

jobs:
  validate-promotion:
    name: 'Validate promotion'
    runs-on: ubuntu-latest
    steps:
      - name: 'Read env variables'
        run: |
          echo "isdevelopment-branch=${{ env.is-development-branch }}"
          echo "is-maintenance-branch=${{ env.is-maintenance-branch }}"
          echo "promotion-type=${{ inputs.promotion-type }}"
          echo "${{ github.ref_name }}"
      - name: 'Check promotion type'
        if: "!(${{ inputs.promotion-type }} != 'preview' || ${{ inputs.promotion-type }} != 'release')"
        run: |
            echo "Invalid promotion type: ${{ inputs.promotion-type }}"
            exit 1
      - name: 'Check source branch'
        if: ${{ !env.is-development-branch }} || ${{ !env.is-maintenance-branch }}
        run: |
            echo "Invalid source branch: ${{ github.ref_name }}"
            exit 1
