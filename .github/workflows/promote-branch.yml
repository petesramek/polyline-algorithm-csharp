name: 'Promote branch'

on:
  workflow_dispatch:
   inputs:
     promotion-type:
       type: choice
       options:
         - 'preview'
         - 'release'
       description: 'Promotion type.'
       required: true

permissions:
  actions: read
  id-token: write
  contents: write

concurrency:
    group: 'promote-branch-${{ inputs.promotion-type }}-${{github.ref_name }}'
    cancel-in-progress: false

env:
  dotnet-sdk-version: '9.x'
  is-development-branch: ${{ startsWith(github.ref_name, 'develop') }}
  is-maintenance-branch: ${{ startsWith(github.ref_name, 'support') }}

jobs:
  versioning:
    name: 'Extract version (new)'
    runs-on: ubuntu-latest
    outputs:
        friendly-version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: 'Checkout ${{ github.head_ref || github.ref }}'
        uses: actions/checkout@v5
      - name: 'Setup .NET ${{ env.dotnet-sdk-version }}'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.dotnet-sdk-version }}
      - name: 'Extract version from branch name'
        id: extract-version
        uses: './.github/actions/extract-version'
        with:
          branch-name: ${{ github.ref_name }}
  workflow-variables:
    name: 'Set workflow variables'
    needs: [versioning]
    runs-on: ubuntu-latest
    outputs:
        target-branch: ${{ steps.compose-target-branch.outputs.target-branch }}
    steps:
      - name: 'Compose target branch name'
        id: compose-target-branch
        run: |
          if [[ "${{ inputs.promotion-type }}" == "preview" ]]; then
            target_branch="preview/${{ needs.versioning.outputs.friendly-version }}"
          elif [[ "${{ inputs.promotion-type }}" == "release" ]]; then
            target_branch="release/${{ needs.versioning.outputs.friendly-version }}"
          fi
          
          echo "Target branch: $target_branch"

          echo "target-branch=$target_branch" >> $GITHUB_OUTPUT
  validate-promotion:
    name: 'Validate promotion'
    needs: [ versioning, workflow-variables ]
    runs-on: ubuntu-latest
    outputs:
        target-branch: ${{ steps.compose-target-branch.outputs.target-branch }}
    steps:
      - name: 'Checkout ${{ github.head_ref || github.ref }}'
        uses: actions/checkout@v4
      - name: 'Check promotion type'
        if: ${{ (inputs.promotion-type != 'release') && (inputs.promotion-type != 'preview') }}
        run: |
          echo "Invalid promotion type: ${{ inputs.promotion-type }}"
          exit 1
      - name: 'Check source branch'
        if: ${{ (env.isdevelopment-branch == 'false') && (env.is-maintenance-branch == 'false') }}
        run: |
          echo "Invalid source branch: ${{ github.ref_name }}"
          exit 1
      - name: 'Validate target branch'
        env:
          target-branch: ${{ needs.workflow-variables.outputs.target-branch }}
        run: |
          exit_code=$(echo git ls-remote --exit-code --heads origin ${{ env.target-branch }})

          if [[ $exit_code -eq 0 ]]; then
            echo "Target branch exist: ${{ env.target-branch }}"
            exit 1
          fi
