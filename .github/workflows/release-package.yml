name: 'Release NuGet package'

permissions:
  actions: read

on:
  workflow_call:
    inputs:
    # Required
      artifact-run-id:
        description: 'The run ID of the artifact workflow.'
        required: true
        type: string
      artifact-name:
        description: 'The name of the artifact to download.'
        required: true
        type: string
      nuget-feed-url:
        description: 'NuGet feed URL.'
        type: 'string'
        required: true
      nuget-feed-server:
        description: 'NuGet feed type. Allowed values: ''NuGet'', ''AzureArtifacts''.'
        type: 'string'
        required: true
    # Optional
      dotnet-sdk-version:
        description: 'Version of the .NET SDK to use. Default: ''9.0.x''.'
        type: string
        required: false
        default: '9.0.x'
      environment:
        description: 'Environment to run the action in. Default: ''''.'
        type: 'string'
        required: false
        default: 'development'
    secrets:
      nuget_api_key:
        description: 'NuGet API key.'
        required: true
jobs:
  release-package:
    name: Release package with .NET CLI
    runs-on: ubuntu-latest

    env:
      working-directory: '/packages/${{ github.run_id }}-${{ github.run_attempt }}'

    environment:
      name: ${{ inputs.environment }}

    steps:

      - if: ${{ inputs.nuget-feed-server != 'NuGet' || inputs.nuget-feed-server != 'AzureArtifacts' }}
        name: 'Invalid NuGet feed server type'
        shell: bash
        run: |
          echo "Invalid NuGet feed server type. Allowed values are ''NuGet'' or ''AzureArtifacts''."
          exit 1

      - name: 'Checkout ${{ github.head_ref || github.ref }}'
        uses: actions/checkout@v4

      - name: 'Setup .NET ${{ inputs.dotnet-sdk-version }}'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-sdk-version }}

      - name: 'Download artifact'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.artifact-run-id }}
          name: ${{ inputs.artifact-name }}
          path: ${{ env.working-directory }}

      - if: ${{ inputs.nuget-feed-server == 'NuGet' }}
        name: 'Publish package to NuGet'
        shell: bash
        run: |
          dotnet nuget push **/*.nupkg --source ${{ inputs.nuget-feed-url }} --api-key ${{ secrets.nuget_api_key }}
        working-directory: ${{ runner.temp }}/${{ env.working-directory }}

      - if: ${{ inputs.nuget-feed-server == 'AzureArtifacts' }}
        name: 'Publish package to Azure Artifacts'
        shell: bash
        run: |
          dotnet nuget add source ${{ inputs.nuget-feed-url }} --name nuget-feed --username username --password ${{ secrets.nuget_api_key }} --store-password-in-clear-text
          dotnet nuget push **/*.nupkg --source nuget-feed --api-key ${{ secrets.nuget_api_key }}
        working-directory: ${{ runner.temp }}/${{ env.working-directory }}