name: 'Determine version'
author: 'Pete Sramek'
description: 'Determines versions for the build.'
inputs:
# Required
  branch-name:
    description: 'Branch name.'
    required: true
# Optional
  version-format:
    description: 'Version format. Default: ''(<Major>?/d+).(<Minor>?/d+)'''
    required: false
    default: '(\d+).(\d+)'
  dotnet_sdk_version:
    description: '.NET SDK version. Default: ''9.x'''
    required: false
    default: '9.x'
    
runs:  
  using: "composite"
  steps:
    - name: 'Checkout ${{ github.head_ref || github.ref }}'
      uses: actions/checkout@v5
    
    - name: 'Setup .NET ${{ inputs.dotnet_sdk_version }}'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet_sdk_version }}
    
    - name: 'what what'
      id: regex-match
      uses: actions-ecosystem/action-regex-match@v2
      with:
        text: ${{ inputs.branch-name }}
        regex: ${{ inputs.version-format }}
        flags: 'g'

    - name: 'Capture version in branch name'
      shell: bash
      run: |
        echo "${{ inputs.branch-name }}"
        echo "${{ inputs.version-format }}"
        echo "${{ steps.regex-match.outputs.match }}"
        echo "${{ steps.regex-match.outputs.group1 }}"
        echo "${{ steps.regex-match.outputs.group2 }}"
