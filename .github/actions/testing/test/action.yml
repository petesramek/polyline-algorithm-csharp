name: 'Test with .NET CLI'
author: 'Pete Sramek'
description: 'Run tests, collects code coverage, logs test results, uploads test artifacts'
inputs:
# Required

# Optional
  dotnet_sdk_version:
    description: '.NET SDK version. Default: 10.x'
    required: false
    default: '10.x'
  build-configuration:
    description: 'Build configuration. Default: Release'
    required: false
    default: 'Release'
  project-path:
    description: 'Test project path.'
    required: true
  use-trf-logger:
    description: 'Use TRX logger. Default: true'
    required: false
    default: 'true'
  collect-code-coverage:
    description: 'Collect code coverage. Default: true'
    required: false
    default: 'true'
  code-coverage-output-format:
    description: 'Code coverage output format. Default: cobertura'
    required: false
    default: 'cobertura'
  code-coverage-settings-file:
    description: 'Code coverage settings file. Default: '
    required: false
    default: ''
  upload-test-artifacts:
    description: 'Upload test artifacts, Default: true'
    required: false
    default: 'true'
  test-results-directory:
    description: 'Search pattern for test artifacts. Default: test-results'
    required: false
    default: |
      'test-results'
  test-artifacts-name:
    description: 'Test artifacts name, Default: test-results'
    required: false
    default: 'test-results'

runs:
  using: composite
  steps:
    - name: 'Checkout ${{ github.head_ref || github.ref }}'
      uses: actions/checkout@v6
    
    - name: 'Setup .NET ${{ inputs.dotnet_sdk_version }}'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet_sdk_version }}

    - name: 'Test with .NET CLI'
      shell: bash
      env:
        DOTNET_USE_TEST_PLATFORM: '1'
      run: |
        ARGS=()
        ARGS+=("${{ inputs.project-path }}")
        ARGS+=(--configuration "${{ inputs.build-configuration }}")
        ARGS+=(--results-directory "${{ inputs.test-results-directory }}")

        # Optional TRX logger
        if [[ "${{ inputs.use-trf-logger }}" == "true" ]]; then
          ARGS+=(--logger:trx)
        fi

        # Optional code coverage logic
        if [[ "${{ inputs.collect-code-coverage }}" == "true" ]]; then
          ARGS+=(--collect:"XPlat Code Coverage")

          if [[ -n "${{ inputs.code-coverage-settings-file }}" ]]; then
            ARGS+=(--settings "${{ inputs.code-coverage-settings-file }}")
          fi

          ARGS+=(--property:CoverletOutputFormat="${{ inputs.code-coverage-output-format }}")
        fi

        echo "Running: dotnet test ${ARGS[*]}"
        dotnet test "${ARGS[@]}"

    - name: 'Upload test results'
      if: ${{ inputs.upload-test-artifacts == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: '${{ inputs.test-artifacts-name }}'
        path: '${{ inputs.test-results-directory }}*'
