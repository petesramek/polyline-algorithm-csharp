name: 'Versioning with GitVersion $INPUT_GIT_VERSION'
description: 'Generating software versions'
inputs:
  git-version:
    description: 'Version of GitVersion'
    required: true
    default: 6.0.x
  git-action-version:
    description: 'Version of GitVersion action'
    required: true
    default: v3.1.11
  is-release:
    description: 'Release flag'
    required: false
    default: 'false'
outputs:
  ASSEMBLY_VERSION:
    description: ''
    value: ${{ steps.gitversion.outputs.assemblySemVer }}.${{ github.run_number }}
  ASSEMBLY_INFORMATIONAL_VERSION:
    description: ''
    value: ${{ steps.gitversion.outputs.assemblySemVer }}.${{ github.run_number }}+${{ steps.gitversion.outputs.sha }}
  FILE_VERSION:
    description: ''
    value: ${{ steps.gitversion.outputs.assemblySemVer }}.${{ github.run_number }}
  PACKAGE_VERSION:
    description: ''
    value: ${{ fromJSON(format('[ "{0}{1}", "{0}" ]', steps.gitversion.outputs.assemblySemVer, steps.gitversion.outputs.preReleaseLabelWithDash))[fromJSON(inputs.is-release)] }}
    
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Install GitVersion ${{ inputs.git-version }}
      uses: gittools/actions/gitversion/setup@${{ inputs.git-version }}
      with:
        versionSpec: $INPUT_GIT_VERSION
        preferLatestVersion: true
    - name: Calculate version with GitVersion ${{ inputs.git-version }}
      id: gitversion
      uses: gittools/actions/gitversion/execute@${{ inputs.git-action-version }}
      with:
        useConfigFile: true
        configFilePath: ./.gitversion/version.yml

