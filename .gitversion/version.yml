assembly-versioning-format: '{Major}.{Minor}.{CommitsSinceVersionSource}'
assembly-file-versioning-format: '{Major}.{Minor}.{CommitsSinceVersionSource}'
assembly-informational-format: '{Major}.{Minor}.{CommitsSinceVersionSource}'
tag-prefix: '[vV]?'
version-in-branch-pattern: (?<version>[vV]?\d+.\d+(\.\d+){0,1})
update-build-number: true
semantic-version-format: Loose
strategies:
- VersionInBranchName
- TrackReleaseBranches
- Fallback
ignore:
  sha: []
mode: ContinuousDeployment
label: ''
increment: None
prevent-increment:
  of-merged-branch: true
  when-branch-merged: true
  when-current-commit-tagged: true
track-merge-target: false
track-merge-message: false
commit-message-incrementing: Disabled
regex: ''
source-branches: []
is-source-branch-for: []
tracks-release-branches: false
is-release-branch: false
is-main-branch: false
branches:
  main:
    mode: ManualDeployment
    label: ''
    increment: Inherit
    regex: ^master$|^main$
    is-main-branch: true
  develop:
    mode: ContinuousDeployment
    label: alpha
    increment: Inherit
    regex: ^develop\/([vV]?\d+.\d+(\.\d+){0,1})$
    source-branches:
    - feature
  preview:
    mode: ContinuousDeployment
    label: preview
    increment: Inherit
    regex: ^preview\/([vV]?\d+.\d+(\.\d+){0,1})$
    source-branches:
    - release
    - develop
  release:
    mode: ContinuousDeployment
    label: ''
    increment: Inherit
    regex: ^release\/([vV]?\d+.\d+(\.\d+){0,1})$
    source-branches:
    - preview
    - support
    is-release-branch: true
  hotfix:
    mode: ContinuousDelivery
    label: hotfix
    increment: Inherit
    regex: ^hotfix(es)?\/(?<BranchName>.+)
    source-branches:
    - release
  support:
    mode: ContinuousDelivery
    label: beta
    increment: Inherit
    regex: ^(support|maintenance)\/(?<BranchName>.+)
    source-branches:
    - release
  bugfix:
    mode: ContinuousDelivery
    label: bugfix
    increment: Inherit
    regex: ^bugfix(es)?\/(?<BranchName>.+)
    source-branches:
    - support
  feature:
    mode: ContinuousDelivery
    label: '{BranchName}'
    increment: Inherit
    regex: ^feature(s)?\/(?<BranchName>.+)
    source-branches:
    - develop
  pull-request:
    mode: ContinuousDelivery
    label: pull-request-
    increment: Inherit
    track-merge-target: true
    regex: ^(pull|pull\-requests|pr)[/-]
    source-branches:
    - develop
    - preview
    - release
    - hotfix
    - bugfix
    - support
    - feature
  unknown:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Inherit
    regex: (?<BranchName>.+)
    source-branches:
    - main
    - develop
    - preview
    - release
    - hotfix
    - bugfix
    - support
    - feature